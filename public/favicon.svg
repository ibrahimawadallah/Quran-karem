<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24"/>
      <stop offset="100%" style="stop-color:#d97706"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="64" height="64" rx="12" fill="#0a0518"/>
  
  <!-- Book shape -->
  <g transform="translate(32, 32)">
    <!-- Left page -->
    <path d="M-1,-16 C-1,-17 1,-17 1,-16 L1,14 C1,15 -1,15 -1,14 Z" fill="#fef3c7" stroke="url(#goldGrad)" stroke-width="0.5"/>
    
    <!-- Right page -->
    <path d="M1,-16 C1,-17 -1,-17 -1,-16 L-1,14 C-1,15 1,15 1,14 Z" fill="#fef3c7" stroke="url(#goldGrad)" stroke-width="0.5"/>
    
    <!-- Spine -->
    <line x1="0" y1="-17" x2="0" y2="15" stroke="url(#goldGrad)" stroke-width="1"/>
    
    <!-- Text lines - left -->
    <line x1="-8" y1="-10" x2="-2" y2="-10" stroke="#d97706" stroke-width="0.4" opacity="0.7"/>
    <line x1="-8" y1="-7" x2="-2" y2="-7" stroke="#d97706" stroke-width="0.4" opacity="0.7"/>
    <line x1="-8" y1="-4" x2="-2" y2="-4" stroke="#d97706" stroke-width="0.4" opacity="0.7"/>
    <line x1="-8" y1="-1" x2="-2" y2="-1" stroke="#d97706" stroke-width="0.4" opacity="0.7"/>
    <line x1="-8" y1="2" x2="-2" y2="2" stroke="#d97706" stroke-width="0.4" opacity="0.7"/>
    <line x1="-8" y1="5" x2="-2" y2="5" stroke="#d97706" stroke-width="0.4" opacity="0.7"/>
    <line x1="-8" y1="8" x2="-2" y2="8" stroke="#d97706" stroke-width="0.4" opacity="0.7"/>
    
    <!-- Text lines - right -->
    <line x1="2" y1="-10" x2="8" y2="-10" stroke="#d97706" stroke-width="0.4" opacity="0.7"/>
    <line x1="2" y1="-7" x2="8" y2="-7" stroke="#d97706" stroke-width="0.4" opacity="0.7"/>
    <line x1="2" y1="-4" x2="8" y2="-4" stroke="#d97706" stroke-width="0.4" opacity="0.7"/>
    <line x1="2" y1="-1" x2="8" y2="-1" stroke="#d97706" stroke-width="0.4" opacity="0.7"/>
    <line x1="2" y1="2" x2="8" y2="2" stroke="#d97706" stroke-width="0.4" opacity="0.7"/>
    <line x1="2" y1="5" x2="8" y2="5" stroke="#d97706" stroke-width="0.4" opacity="0.7"/>
    <line x1="2" y1="8" x2="8" y2="8" stroke="#d97706" stroke-width="0.4" opacity="0.7"/>
  </g>
</svg>
