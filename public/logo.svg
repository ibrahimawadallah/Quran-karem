<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0f2e"/>
      <stop offset="100%" style="stop-color:#0a0518"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24"/>
      <stop offset="50%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#d97706"/>
    </linearGradient>
    <linearGradient id="pageGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fef3c7"/>
      <stop offset="100%" style="stop-color:#fde68a"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background circle -->
  <circle cx="256" cy="256" r="248" fill="url(#bgGrad)" stroke="url(#goldGrad)" stroke-width="8"/>
  
  <!-- Decorative outer ring -->
  <circle cx="256" cy="256" r="232" fill="none" stroke="url(#goldGrad)" stroke-width="2" opacity="0.4"/>
  
  <!-- Quran book shape -->
  <g transform="translate(256, 256) scale(1.1)" filter="url(#glow)">
    <!-- Left page -->
    <path d="M-8,-120 C-8,-130 8,-130 8,-120 L8,100 C8,110 -8,110 -8,100 Z" fill="url(#pageGrad)" stroke="url(#goldGrad)" stroke-width="3"/>
    
    <!-- Right page -->
    <path d="M8,-120 C8,-130 -8,-130 -8,-120 L-8,100 C-8,110 8,110 8,100 Z" fill="url(#pageGrad)" stroke="url(#goldGrad)" stroke-width="3"/>
    
    <!-- Book spine -->
    <line x1="0" y1="-125" x2="0" y2="105" stroke="url(#goldGrad)" stroke-width="4"/>
    
    <!-- Decorative lines on pages - left -->
    <line x1="-60" y1="-80" x2="-15" y2="-80" stroke="#d97706" stroke-width="2" opacity="0.6"/>
    <line x1="-60" y1="-60" x2="-15" y2="-60" stroke="#d97706" stroke-width="2" opacity="0.6"/>
    <line x1="-60" y1="-40" x2="-15" y2="-40" stroke="#d97706" stroke-width="2" opacity="0.6"/>
    <line x1="-60" y1="-20" x2="-15" y2="-20" stroke="#d97706" stroke-width="2" opacity="0.6"/>
    <line x1="-60" y1="0" x2="-15" y2="0" stroke="#d97706" stroke-width="2" opacity="0.6"/>
    <line x1="-60" y1="20" x2="-15" y2="20" stroke="#d97706" stroke-width="2" opacity="0.6"/>
    <line x1="-60" y1="40" x2="-15" y2="40" stroke="#d97706" stroke-width="2" opacity="0.6"/>
    <line x1="-60" y1="60" x2="-15" y2="60" stroke="#d97706" stroke-width="2" opacity="0.6"/>
    
    <!-- Decorative lines on pages - right -->
    <line x1="15" y1="-80" x2="60" y2="-80" stroke="#d97706" stroke-width="2" opacity="0.6"/>
    <line x1="15" y1="-60" x2="60" y2="-60" stroke="#d97706" stroke-width="2" opacity="0.6"/>
    <line x1="15" y1="-40" x2="60" y2="-40" stroke="#d97706" stroke-width="2" opacity="0.6"/>
    <line x1="15" y1="-20" x2="60" y2="-20" stroke="#d97706" stroke-width="2" opacity="0.6"/>
    <line x1="15" y1="0" x2="60" y2="0" stroke="#d97706" stroke-width="2" opacity="0.6"/>
    <line x1="15" y1="20" x2="60" y2="20" stroke="#d97706" stroke-width="2" opacity="0.6"/>
    <line x1="15" y1="40" x2="60" y2="40" stroke="#d97706" stroke-width="2" opacity="0.6"/>
    <line x1="15" y1="60" x2="60" y2="60" stroke="#d97706" stroke-width="2" opacity="0.6"/>
    
    <!-- Star decoration at top -->
    <polygon points="0,-145 -5,-135 5,-135" fill="url(#goldGrad)"/>
    
    <!-- Crescent at bottom -->
    <path d="M0,125 C-12,115 -12,135 0,145 C12,135 12,115 0,125 Z" fill="url(#goldGrad)"/>
  </g>
  
  <!-- Small decorative dots around the border -->
  <circle cx="256" cy="32" r="4" fill="#fbbf24" opacity="0.8"/>
  <circle cx="256" cy="480" r="4" fill="#fbbf24" opacity="0.8"/>
  <circle cx="32" cy="256" r="4" fill="#fbbf24" opacity="0.8"/>
  <circle cx="480" cy="256" r="4" fill="#fbbf24" opacity="0.8"/>
</svg>
